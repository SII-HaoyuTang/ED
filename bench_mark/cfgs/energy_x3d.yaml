# PointMetaBase-S-X3D configuration for EDBench ED5-EC energy prediction
# Faithfully mirrors EDBench cfgs/energy/pointmetabase-s-x-3d.yaml

model:
  name: PointMetaBaseX3D
  in_channels: 4            # [x, y, z, electron_density]
  width: 32                 # base channel width
  num_targets: 6            # 6 DFT energy components
  npoint_start: 2048        # input points (after FPS)

  # Stage configuration (6 stages)
  blocks:  [1, 1, 1, 1, 1, 1]
  strides: [1, 2, 2, 2, 2, 1]   # stride-2: FPS to half the points

  # Ball-query parameters
  radius: 0.15              # base radius (Bohr)
  radius_mult: 1.5          # multiplier per stage
  K: 32                     # neighbours per query point

  # X-3D explicit structure encoding
  x3d_layers: [3, 4]        # 1-indexed stages with PCA + PointHop
  struct_channels: 33       # PCA(9) + PointHop(24)
  x3d_hidden: 32            # hidden dim in structure kernel

  # Regression head
  mlp_layers: [512, 256]
  dropout: 0.5
  norm: bn1d

  # Reported efficiency (from paper)
  # throughput: 2032.94    # samples/sec
  # gflops: 6.49
  # params: 4.523M

data:
  npoint: 2048              # FPS target (matches model.npoint_start)
  split_col: scaffold_split # CSV column for train/valid/test split

training:
  loss: MSELoss
  optimizer: AdamW
  lr: 1.0e-3
  weight_decay: 0.05
  scheduler: CosineAnnealingLR
  epochs: 100
  batch_size: 32
  num_workers: 6
  gradient_clip: 1.0

evaluation:
  metrics: [MAE, RMSE, Pearson, Spearman]
  targets:
    - "E1_Final"
    - "E2_NucRepul"
    - "E3_OneElec"
    - "E4_TwoElec"
    - "E5_XC"
    - "E6_Total"

# Paper-reported X-3D results (MAE ± std, Hartree)
# Used as reproduction targets:
baseline_results:
  E1_Final:   {MAE: 190.77, std: 1.98}
  E2_NucRepul: {MAE: 109.21, std: 2.82}
  E3_OneElec: {MAE: 369.88, std: 1.34}
  E4_TwoElec: {MAE: 150.05, std: 0.27}
  E5_XC:      {MAE: 8.13,   std: 0.51}
  E6_Total:   {MAE: 190.77, std: 1.98}
